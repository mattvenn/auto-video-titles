name: Smoke Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Smoke render — one still frame per composition
        run: |
          mkdir -p out/smoke
          COMPOSITIONS="LowerThirdVFD LowerThirdCallToAction TTLowerThird TTCallToAction Z2ATitleBar Z2ATitleBarV2 Z2ALogoAnim Z2AIntro"
          for comp in $COMPOSITIONS; do
            echo "--- $comp ---"
            npx remotion still src/index.ts "$comp" "out/smoke/${comp}.png" --frame=0
          done

      - name: Verify outputs are non-empty
        run: |
          failed=0
          for comp in LowerThirdVFD LowerThirdCallToAction TTLowerThird TTCallToAction Z2ATitleBar Z2ATitleBarV2 Z2ALogoAnim Z2AIntro; do
            f="out/smoke/${comp}.png"
            if [ ! -s "$f" ]; then
              echo "FAIL: $f is missing or empty"
              failed=1
            else
              echo "OK: $f ($(stat -c%s "$f") bytes)"
            fi
          done
          exit $failed

      - name: Upload smoke frames
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-frames
          path: out/smoke/
          retention-days: 7
