# Tiny Tapeout Lower-Third Title Cards
# "Part 1 - You Submitted!" — Zero to ASIC Course
#
# timecode: HH:MM:SS.mmm  (matches SRT source timestamps)
# composition: override per card; defaults to config.composition
#   TTLowerThird    — 2-line branded card (name, title)
#   TTCallToAction  — 3-line branded CTA  (header, line1, line2)
# enabled: set to false to skip a card without deleting it

[config]
srt_file        = "part 1 - you submitted!.srt"
output_dir      = "out/part1"
composition     = "TTLowerThird"
fps             = 30
timeline_offset = "00:00:00.000"

# ── Presenter ─────────────────────────────────────────────────────────────────

[[cards]]
id      = "intro"
section = "Intro"
name    = "Part 1"
title   = "You submitted, what happens next?"
timecode = "01:00:01.21"
enabled = true
notes   = "intro card"


