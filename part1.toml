# VFD Lower-Third Title Cards
# "Part 1 - You Submitted!" — Zero to ASIC Course
#
# Edit line1 / line2 freely. At current dot size (~4px) keep lines under ~20 chars.
# timecode: HH:MM:SS.mmm  (matches SRT source timestamps)
# composition: override per card; defaults to config.composition
#   LowerThirdVFD           — 2-line bug (line1, line2)
#   LowerThirdCallToAction  — 3-line panel (header, line1, line2)
# enabled: set to false to skip a card without deleting it

[config]
srt_file        = "part 1 - you submitted!.srt"
output_dir      = "out/titles"
composition     = "LowerThirdVFD"
fps             = 30
timeline_offset = "00:00:00.000"  # SRT and Resolve timeline both start at 01:00:00, so offset cancels out

# ── Presenter / channel ───────────────────────────────────────────────────────

[[cards]]
id         = "presenter"
section    = "Intro"
line1      = "Matt Venn"
line2      = "Zero to ASIC Course"
timecode   = "01:00:03.766"
enabled    = true
notes      = "Opening — show as Matt begins speaking"

